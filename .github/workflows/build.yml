name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 tag 时触发（如 v1.0）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shc
        run: sudo apt-get install -y shc

      - name: Compile
        run: |
          shc -f pvezh.sh -o pvezh
          sha256sum pvezh > pvezh.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pvezh
            pvezh.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
