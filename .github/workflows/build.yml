name: Build and Release

on:
  workflow_dispatch:    # 手动触发
    inputs:
      tag:
        description: 'Release 版本号（如 v1.0）'
        required: true
        default: 'v1.0'
  push:
    tags:
      - 'v*'  # 推送 tag 时自动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shc
        run: sudo apt-get install -y shc

      - name: Compile
        run: |
          shc -f pvezh.sh -o pvezh
          sha256sum pvezh > pvezh.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: |
            pvezh
            pvezh.sha256
